server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Try exact path, then path + .html extension, then directory index.
    # This is needed because SvelteKit adapter-static outputs flat .html files
    # (e.g. analyze.html) rather than analyze/index.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Serve SvelteKit's generated 404 page on not-found
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
